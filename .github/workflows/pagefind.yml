name: Deploy Pagefind to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Instructs GitHub to safely execute on the updated Node 24 engine

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install and Run Pagefind Search Compiler
        run: |
          pip install 'pagefind[extended]'
          python3 -m pagefind --site .

      - name: Upload Static Assets to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages Live
        uses: actions/deploy-pages@v4
